<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Fehler')}"></head>
<body>
<header th:replace="~{fragments :: topbar}"></header>
<main>
    <h1>Fehler <span th:text="${status}">404</span></h1>
    <div class="alert err" th:text="${error} ?: 'Die Anfrage konnte nicht verarbeitet werden.'">Fehler</div>
    <p class="muted">Diese Seite zeigt bewusst keine internen Details (A10 — keine
        Stack-Traces, keine Pfade).</p>
    <a class="btn ghost" th:href="@{/}">Zur Startseite</a>
</main>
</body>
</html>
